# AstrBot 桌面版构建配置
# ========================

project:
  name: "AstrBot"
  version: "4.19.4"
  entry_point: "desktop_main.py"

  # PyInstaller 隐藏导入
  hidden_imports:
    - "uvicorn.logging"
    - "uvicorn.protocols"
    - "uvicorn.protocols.http"
    - "uvicorn.protocols.http.auto"
    - "uvicorn.protocols.websockets"
    - "uvicorn.protocols.websockets.auto"
    - "uvicorn.lifespan"
    - "uvicorn.lifespan.on"
    - "aiocqhttp"
    - "aiosqlite"
    - "quart"
    - "telegram.ext"
    - "discord"
    # PySide6
    - "PySide6"
    - "PySide6.QtCore"
    - "PySide6.QtGui"
    - "PySide6.QtWebEngineWidgets"
    - "PySide6.QtWebEngineCore"

  # 排除模块
  excludes:
    - "tkinter"
    - "matplotlib"
    - "numpy.f2py"
    - "IPython"
    - "jupyter"
    - "pytest"

# 前端构建配置
frontend:
  # AstrBot Dashboard 目录（默认 dashboard）
  astrbot: "dashboard"
  # NapCatQQ 目录（绝对路径，不配置则不构建 NapCatQQ）
  napcat: "D:\\work\\Bot\\NapCatQQ"

# 桌面版配置
desktop:
  auto_detect: true
  window_title: "AstrBot 桌面版"
  window_size: [1280, 800]
  astrbot_port: 6185
  napcat_port: 6099
  napcat_wait_timeout: 30

# 本地构建配置
local:
  output_dir: "dist"
  one_file: false
  console: false
  icon: null
  upx: false

# Docker
docker:
  platforms:
    - platform: "windows/amd64"
      enabled: true
      output_name: "AstrBot-Desktop-windows-amd64"
    - platform: "linux/amd64"
      enabled: true
      output_name: "AstrBot-Desktop-linux-amd64"
  image:
    base: "python:3.12-slim"
  cleanup: true
